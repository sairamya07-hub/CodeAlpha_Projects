<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcard Quiz App | CodeAlpha</title>
  <meta name="description" content="A beautiful flashcard quiz app to help you study and memorize topics efficiently." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">FlashCard<span class="logo-accent">Pro</span></span>
      </div>
      <div class="header-stats">
        <div class="stat-pill" id="totalCards">0 Cards</div>
        <div class="stat-pill progress-pill" id="progressPill">Card 0/0</div>
      </div>
    </div>
  </header>

  <main class="main">
    <!-- Flashcard Section -->
    <section class="card-section" id="cardSection">
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="card-wrapper">
        <div class="flashcard" id="flashcard">
          <div class="card-face card-front">
            <div class="card-tag">Question</div>
            <p class="card-text" id="questionText">No flashcards yet. Add some below!</p>
            <button class="show-answer-btn" id="showAnswerBtn" onclick="revealAnswer()">
              <span>Show Answer</span>
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="card-face card-back">
            <div class="card-tag answer-tag">Answer</div>
            <p class="card-text" id="answerText"></p>
            <div class="rating-row">
              <span class="rating-label">How well did you know it?</span>
              <div class="rating-btns">
                <button class="rate-btn rate-hard" onclick="rateCard('hard')">😅 Hard</button>
                <button class="rate-btn rate-ok" onclick="rateCard('ok')">🙂 OK</button>
                <button class="rate-btn rate-easy" onclick="rateCard('easy')">🎉 Easy</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="nav-controls">
        <button class="nav-btn" id="prevBtn" onclick="prevCard()">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
          Previous
        </button>
        <button class="shuffle-btn" onclick="shuffleCards()">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
          Shuffle
        </button>
        <button class="nav-btn" id="nextBtn" onclick="nextCard()">
          Next
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </section>

    <!-- Manage Cards Section -->
    <section class="manage-section">
      <div class="section-header">
        <h2 class="section-title">Manage Flashcards</h2>
        <button class="add-btn" onclick="openModal()">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Card
        </button>
      </div>

      <div class="cards-grid" id="cardsGrid">
        <!-- Cards rendered here by JS -->
      </div>

      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📚</div>
        <h3>No flashcards yet</h3>
        <p>Click "Add Card" to create your first flashcard and start studying!</p>
      </div>
    </section>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Add Flashcard</h3>
        <button class="modal-close" onclick="closeModal()">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="questionInput">Question</label>
          <textarea class="form-input" id="questionInput" placeholder="Enter your question here..." rows="3"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="answerInput">Answer</label>
          <textarea class="form-input" id="answerInput" placeholder="Enter the answer here..." rows="3"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="categoryInput">Category (optional)</label>
          <input class="form-input" id="categoryInput" type="text" placeholder="e.g., Science, Math, History" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" id="saveBtn" onclick="saveCard()">Save Card</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
