<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Quote Generator | CodeAlpha</title>
  <meta name="description" content="Get inspired with beautiful random quotes. Share, copy, and discover wisdom every day." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Animated background -->
  <div class="bg-canvas" id="bgCanvas"></div>
  <div class="bg-overlay"></div>

  <div class="app-shell">
    <!-- Header -->
    <header class="header">
      <div class="header-logo">
        <span class="logo-sparkle">✦</span>
        <span>QuoteVerse</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="favoritesToggle" onclick="toggleFavoritesPanel()" title="Favorites">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
          <span class="fav-count" id="favCount">0</span>
        </button>
        <button class="icon-btn" onclick="toggleDark()" title="Toggle theme" id="themeBtn">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" id="themeIcon"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
      </div>
    </header>

    <main class="main-content">
      <!-- Category Filter -->
      <div class="category-bar" id="categoryBar">
        <button class="cat-btn active" data-cat="all" onclick="filterCategory(this, 'all')">All</button>
        <button class="cat-btn" data-cat="Motivation" onclick="filterCategory(this, 'Motivation')">Motivation</button>
        <button class="cat-btn" data-cat="Wisdom" onclick="filterCategory(this, 'Wisdom')">Wisdom</button>
        <button class="cat-btn" data-cat="Success" onclick="filterCategory(this, 'Success')">Success</button>
        <button class="cat-btn" data-cat="Life" onclick="filterCategory(this, 'Life')">Life</button>
        <button class="cat-btn" data-cat="Science" onclick="filterCategory(this, 'Science')">Science</button>
        <button class="cat-btn" data-cat="Creativity" onclick="filterCategory(this, 'Creativity')">Creativity</button>
      </div>

      <!-- Quote Card -->
      <div class="quote-stage">
        <div class="quote-card" id="quoteCard">
          <div class="quote-glow"></div>
          <div class="quote-number" id="quoteNumber">#1</div>
          <div class="quote-body">
            <div class="quote-mark open">"</div>
            <blockquote class="quote-text" id="quoteText">
              The only way to do great work is to love what you do.
            </blockquote>
            <div class="quote-mark close">"</div>
          </div>
          <div class="quote-author-row">
            <div class="author-avatar" id="authorAvatar">SJ</div>
            <div class="author-info">
              <div class="author-name" id="authorName">Steve Jobs</div>
              <div class="quote-category" id="quoteCategory">Motivation</div>
            </div>
          </div>
        </div>

        <!-- Action buttons -->
        <div class="action-row">
          <button class="action-btn-pill" id="likeBtn" onclick="toggleFavorite()" title="Save to favorites">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" id="heartIcon"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
            <span id="likeLabel">Save</span>
          </button>
          <button class="action-btn-pill" onclick="copyQuote()" title="Copy to clipboard">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            <span id="copyLabel">Copy</span>
          </button>
          <button class="action-btn-pill" onclick="shareQuote()" title="Share">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            <span>Share</span>
          </button>
        </div>

        <!-- New Quote Button -->
        <button class="new-quote-btn" id="newQuoteBtn" onclick="newQuote()">
          <span class="btn-text">New Quote</span>
          <svg class="btn-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        </button>

        <!-- Quote counter -->
        <div class="quote-counter" id="quoteCounter">Quote 1 of 30</div>
      </div>
    </main>

    <!-- Favorites Panel -->
    <div class="favorites-panel" id="favoritesPanel">
      <div class="fav-header">
        <h3>❤️ Saved Quotes</h3>
        <button class="icon-btn" onclick="toggleFavoritesPanel()">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="fav-list" id="favList">
        <div class="fav-empty">No saved quotes yet.<br/>Tap the heart to save!</div>
      </div>
    </div>
    <div class="panel-backdrop" id="panelBackdrop" onclick="toggleFavoritesPanel()"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
